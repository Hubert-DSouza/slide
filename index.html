<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SLIDE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./src/styles/main.css">
</head>
<body>

<div id="screen-home" class="screen">
    <!-- Container for dynamically generated decorative background blocks -->
    <div id="home-decor-container" style="position: absolute; inset: 0; pointer-events: none; overflow: hidden; z-index: 1;"></div>

    <h1 class="home-logo">SLIDE.</h1>

    <div class="home-btn-group">
        <!-- Segmented Toggle for Difficulty on Home Screen -->
        <div style="width: 100%; margin-bottom: 0.5rem; z-index: 5;">
            <div class="settings-label" style="text-align: center; margin-bottom: 0.5rem;">Difficulty</div>
            <div class="theme-toggle" id="home-difficulty-toggle">
                <button id="home-diff-easy" onclick="game.setDifficulty('easy')" class="theme-toggle-btn">Easy</button>
                <button id="home-diff-medium" onclick="game.setDifficulty('medium')" class="theme-toggle-btn active">Medium</button>
                <button id="home-diff-hard" onclick="game.setDifficulty('hard')" class="theme-toggle-btn">Hard</button>
            </div>
        </div>

        <button id="btn-home-play" class="home-btn home-btn-primary" onclick="ui.showScreen('screen-game'); game.startInfinite(game.infiniteDifficulty)">
            PLAY
        </button>
        <button class="home-btn" onclick="ui.showDifficultyOverlay()">SETTINGS</button>
    </div>

    <!-- Watermark footer -->
    <div style="position: absolute; bottom: 2rem; left: 0; right: 0; text-align: center; font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.16em; color: var(--text-muted); opacity: 0.45; z-index: 5;">
        Developed by Hubert DSouza
    </div>
</div>

<div id="screen-game" class="screen hidden">
    <div class="game-container">
        <aside class="panel">
            <div id="level-title" class="text-[11px] uppercase font-bold tracking-wider opacity-60 mb-1 text-left w-full">Level 1</div>
            <div class="stat-box stat-moves">
                <div class="text-[10px] uppercase opacity-40 mb-1">Current Moves</div>
                <div id="move-count" class="text-4xl font-bold">0</div>
            </div>
            <div class="stat-box stat-target">
                <div class="text-[10px] uppercase opacity-40 mb-1">Optimal</div>
                <div id="par-count" class="text-4xl font-bold">00</div>
            </div>
            <!-- Keyboard guide overlay in bottom left -->
            <div class="keyboard-guide mt-auto relative !bottom-0 !left-0 !opacity-100 !pointer-events-auto flex flex-col items-start gap-2">
                <div class="keyboard-layout-wrapper flex items-end gap-3">
                    <div class="keys-container flex flex-col gap-1 items-center">
                        <div class="key-row flex gap-1">
                            <div class="key-cap" id="key-up">
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"></polyline></svg>
                            </div>
                        </div>
                        <div class="key-row flex gap-1">
                            <div class="key-cap" id="key-left">
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
                            </div>
                            <div class="key-cap" id="key-down">
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
                            </div>
                            <div class="key-cap" id="key-right">
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
                            </div>
                        </div>
                    </div>
                    
                    <div class="key-cap clickable-key" id="key-r" onclick="game.restart()" title="Reset Level" style="font-weight: 800; font-size: 0.75rem; font-family: var(--font); cursor: pointer; user-select: none;">
                        R
                    </div>
                </div>
                <div class="guide-text" style="font-size: 0.65rem;">Arrows to move / R to reset</div>
            </div>
        </aside>

        <main class="flex flex-col items-center justify-center relative">
            <div id="tutorial-instruction" class="tutorial-instruction hidden"></div>
            <div class="relative">
                <canvas id="game-canvas"></canvas>
                <div id="win-message" class="overlay hidden">
                    <div class="text-center">
                        <h2 class="text-4xl font-bold mb-4">SOLVED.</h2>
                        <button onclick="game.nextLevel()" class="btn px-12">Next Board</button>
                    </div>
                </div>
            </div>
        </main>

        <aside class="panel text-right">
            <!-- Top Right: Reset and Show Solution -->
            <div class="flex flex-col gap-2 w-full">
                <button onclick="game.restart()" class="btn btn-reset">Reset</button>
                <button onclick="game.showSolution()" class="btn btn-secondary w-full btn-solution">Show Solution</button>
            </div>
            
            <!-- Bottom Right: Menu and Settings -->
            <div class="mt-auto flex flex-col gap-2 w-full">
                <button onclick="ui.showScreen('screen-home')" class="btn btn-secondary btn-menu">Menu</button>
                <button onclick="ui.showDifficultyOverlay()" class="btn w-full btn-size">Settings</button>
            </div>
        </aside>
    </div>
</div>

<div id="difficulty-overlay" class="overlay hidden">
    <div class="settings-panel">
        <h2 class="settings-title">Settings</h2>

        <!-- Difficulty Settings -->
        <div class="settings-section">
            <div class="settings-label">Difficulty</div>
            <div class="theme-toggle" id="grid-size-toggle">
                <button id="grid-btn-small" onclick="game.setDifficulty('easy')" class="theme-toggle-btn">Easy</button>
                <button id="grid-btn-medium" onclick="game.setDifficulty('medium')" class="theme-toggle-btn active">Medium</button>
                <button id="grid-btn-large" onclick="game.setDifficulty('hard')" class="theme-toggle-btn">Hard</button>
            </div>
        </div>

        <!-- Theme Settings -->
        <div class="settings-section">
            <div class="settings-label">Theme</div>
            <div class="theme-toggle" id="theme-toggle-row">
                <button id="theme-btn-light" class="theme-toggle-btn active" onclick="game.setTheme('light'); ui.updateSettingsUI(null, 'light')">Light</button>
                <button id="theme-btn-dark" class="theme-toggle-btn" onclick="game.setTheme('dark'); ui.updateSettingsUI(null, 'dark')">Dark</button>
            </div>
        </div>

        <button onclick="ui.hideDifficultyOverlay()" class="win-next-btn" style="width: 100%; margin-top: 1.5rem;">Done</button>
    </div>
</div>

<script type="module" src="./src/js/main.js"></script>
</body>
</html>
