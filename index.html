<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MINIMAL SLIDE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fdfaf7;
            --text: #2d3436;
            --accent: #d63031;
            --path: #2d3436;
            --player: #ffffff;
        }

        body {
            margin: 0;
            overflow: hidden;
            background: var(--bg);
            color: var(--text);
            font-family: 'Space Grotesk', sans-serif;
            user-select: none;
            touch-action: none;
        }

        .game-container {
            display: grid;
            grid-template-columns: 240px 1fr 240px;
            height: 100vh;
            padding: 2rem;
            gap: 2rem;
        }

        canvas {
            display: block;
            border: 2px solid #00000010;
        }

        .panel {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .stat-box {
            background: white;
            padding: 1.5rem;
            border: 1px solid #00000008;
        }

        .btn {
            padding: 0.75rem 1rem;
            background: #2d3436;
            color: white;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 0.1em;
            transition: opacity 0.2s;
            cursor: pointer;
        }

        .btn:hover { opacity: 0.8; }

        .btn-secondary {
            background: transparent;
            color: #2d3436;
            border: 1px solid #2d3436;
        }

        .title {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.05em;
            margin-bottom: 2rem;
        }

        .overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(253, 250, 247, 0.9);
            z-index: 50;
        }

        @media (max-width: 768px) {
            .game-container {
                grid-template-columns: 1fr;
                grid-template-rows: auto 1fr auto;
                padding: 1rem;
                gap: 1rem;
            }
            .panel { flex-direction: row; flex-wrap: wrap; justify-content: space-between; }
            .stat-box { padding: 0.5rem 1rem; }
            .title { display: none; }
        }
    </style>
</head>
<body>

<div class="game-container">
    <aside class="panel">
        <div class="title">SLIDE.</div>
        <div class="stat-box">
            <div class="text-[10px] uppercase opacity-40 mb-1">Current Moves</div>
            <div id="move-count" class="text-4xl font-bold">0</div>
        </div>
        <div class="stat-box">
            <div class="text-[10px] uppercase opacity-40 mb-1">Target</div>
            <div id="par-count" class="text-xl font-bold">00</div>
        </div>
        <div class="mt-auto flex flex-col gap-2 w-full">
            <button onclick="game.undo()" class="btn">Undo</button>
            <button onclick="game.restart()" class="btn">Reset</button>
        </div>
    </aside>

    <main class="flex items-center justify-center relative">
        <div class="relative">
            <canvas id="game-canvas"></canvas>
            <div id="win-message" class="overlay hidden">
                <div class="text-center">
                    <h2 class="text-4xl font-bold mb-4">SOLVED.</h2>
                    <button onclick="game.nextLevel()" class="btn px-12">Next Board</button>
                </div>
            </div>
        </div>
    </main>

    <aside class="panel text-right">
        <div class="text-[10px] uppercase opacity-40 tracking-widest hidden md:block">Navigation</div>
        <div class="stat-box text-left">
            <div class="text-[10px] uppercase opacity-40 mb-1">Level ID</div>
            <div id="level-id" class="font-bold">#---</div>
        </div>
        <div class="stat-box text-left hidden md:block">
            <div class="text-[10px] uppercase opacity-40 mb-2">Instructions</div>
            <p class="text-[11px] leading-relaxed opacity-60">Slide to reach the red goal.</p>
        </div>
        <div class="mt-auto flex flex-col gap-2 w-full">
            <button onclick="game.showSolution()" class="btn btn-secondary w-full">Show Solution</button>
            <button onclick="ui.changeDifficulty()" class="btn w-full">Change Size</button>
        </div>
    </aside>
</div>

<div id="difficulty-overlay" class="overlay">
    <div class="max-w-xs w-full bg-white p-8 border border-black/5 shadow-2xl">
        <h2 class="text-xl font-bold mb-6">Select Grid</h2>
        <div class="flex flex-col gap-2">
            <button onclick="game.init(6)" class="btn bg-slate-200 !text-black hover:!bg-slate-300">Small (6x6)</button>
            <button onclick="game.init(9)" class="btn">Medium (9x9)</button>
            <button onclick="game.init(12)" class="btn bg-red-100 !text-red-700">Large (12x12)</button>
        </div>
    </div>
</div>

<script>
class LevelGenerator {
    generate(size) {
        const grid = Array(size).fill().map(() => Array(size).fill(0));
        const colors = ['#e17055', '#819d7d', '#4b6584', '#fab1a0'];
        const colorGrid = Array(size).fill().map(() => Array(size).fill('').map(() => colors[Math.floor(Math.random() * colors.length)]));

        for (let y = 0; y < size; y++)
            for (let x = 0; x < size; x++)
                if (Math.random() < 0.22) grid[y][x] = 1;

        const start = { x: 0, y: Math.floor(Math.random() * size) };
        const end = { x: size - 1, y: Math.floor(Math.random() * size) };
        grid[start.y][start.x] = 0; grid[end.y][end.x] = 0;

        const solution = this.solve(size, grid, start, end);
        if (!solution || solution.length < 5) return this.generate(size);

        return { size, grid, start, end, par: solution.length, colorGrid, solution };
    }

    solve(size, grid, start, end) {
        const queue = [{ x: start.x, y: start.y, path: [] }];
        const visited = new Set([`${start.x},${start.y}`]);
        const dirs = [{dx:1, dy:0}, {dx:-1, dy:0}, {dx:0, dy:1}, {dx:0, dy:-1}];
        while (queue.length > 0) {
            const { x, y, path } = queue.shift();
            if (x === end.x && y === end.y) return path;
            for (const d of dirs) {
                let cx = x, cy = y;
                while (true) {
                    const nx = cx + d.dx, ny = cy + d.dy;
                    if (nx < 0 || nx >= size || ny < 0 || ny >= size || grid[ny][nx] === 1) break;
                    cx = nx; cy = ny;
                }
                const key = `${cx},${cy}`;
                if (!visited.has(key)) {
                    visited.add(key);
                    queue.push({ x: cx, y: cy, path: [...path, d] });
                }
            }
        }
        return null;
    }
}

class Game {
    constructor() {
        this.canvas = document.getElementById('game-canvas');
        this.ctx = this.canvas.getContext('2d');
        this.generator = new LevelGenerator();
        this.player = { x:0, y:0, vx:0, vy:0 };
        this.moves = 0;
        this.history = [];
        this.pathPoints = [];
        this.state = 'MENU';
        this.size = 9;
        this.isSolving = false;

        window.addEventListener('resize', () => this.resize());
        window.addEventListener('keydown', (e) => this.handleKey(e));
        this.initTouch();
        this.loop();
    }

    init(size) {
        this.size = size;
        document.getElementById('difficulty-overlay').classList.add('hidden');
        this.nextLevel();
    }

    nextLevel() {
        this.level = this.generator.generate(this.size);
        document.getElementById('level-id').innerText = "#" + Math.floor(Math.random() * 1000);
        this.resize();
        this.restart();
    }

    restart() {
        this.isSolving = false;
        this.player.x = this.level.start.x; this.player.y = this.level.start.y;
        this.player.vx = this.player.x; this.player.vy = this.player.y;
        this.moves = 0;
        this.history = [];
        this.pathPoints = [{ x: this.player.x, y: this.player.y }];
        this.state = 'PLAYING';
        document.getElementById('win-message').classList.add('hidden');
        this.updateUI();
    }

    async showSolution() {
        if (this.state !== 'PLAYING' || this.isSolving) return;
        this.restart();
        this.isSolving = true;
        
        for (const dir of this.level.solution) {
            if (!this.isSolving) break;
            this.move(dir.dx, dir.dy);
            while (Math.abs(this.player.x - this.player.vx) > 0.001 || Math.abs(this.player.y - this.player.vy) > 0.001) {
                await new Promise(r => setTimeout(r, 16));
            }
            await new Promise(r => setTimeout(r, 150));
        }
        this.isSolving = false;
    }

    undo() {
        if (this.history.length > 0 && this.state === 'PLAYING' && !this.isSolving) {
            const last = this.history.pop();
            this.player.x = last.x; this.player.y = last.y;
            this.player.vx = last.x; this.player.vy = last.y;
            this.pathPoints.pop();
            this.moves--;
            this.updateUI();
        }
    }

    move(dx, dy) {
        if (this.state !== 'PLAYING') return;
        if (Math.abs(this.player.x - this.player.vx) > 0.001 || Math.abs(this.player.y - this.player.vy) > 0.001) return;

        let cx = this.player.x, cy = this.player.y;
        while (true) {
            const nx = cx + dx, ny = cy + dy;
            if (nx < 0 || nx >= this.level.size || ny < 0 || ny >= this.level.size || this.level.grid[ny][nx] === 1) break;
            cx = nx; cy = ny;
        }
        if (cx !== this.player.x || cy !== this.player.y) {
            this.history.push({ x: this.player.x, y: this.player.y });
            this.player.x = cx; this.player.y = cy;
            this.moves++;
            this.updateUI();
        }
    }

    updateUI() {
        document.getElementById('move-count').innerText = this.moves;
        document.getElementById('par-count').innerText = this.level.par;
    }

    handleKey(e) {
        if (this.isSolving) return;
        switch(e.key) {
            case 'ArrowUp': this.move(0, -1); break;
            case 'ArrowDown': this.move(0, 1); break;
            case 'ArrowLeft': this.move(-1, 0); break;
            case 'ArrowRight': this.move(1, 0); break;
        }
    }

    initTouch() {
        let sx = 0, sy = 0;
        window.addEventListener('touchstart', e => { sx = e.touches[0].clientX; sy = e.touches[0].clientY; }, {passive: false});
        window.addEventListener('touchend', e => {
            if (this.isSolving) return;
            const dx = e.changedTouches[0].clientX - sx, dy = e.changedTouches[0].clientY - sy;
            if (Math.hypot(dx, dy) > 20) {
                if (Math.abs(dx) > Math.abs(dy)) this.move(dx > 0 ? 1 : -1, 0);
                else this.move(0, dy > 0 ? 1 : -1);
            }
        }, {passive: false});
    }

    resize() {
        const container = document.querySelector('main');
        const side = Math.min(container.clientWidth * 0.9, container.clientHeight * 0.9);
        this.tileSize = side / this.size;
        this.canvas.width = side;
        this.canvas.height = side;
    }

    draw() {
        const { ctx, canvas, level, tileSize, player } = this;
        if (!level) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Blocks
        level.grid.forEach((row, y) => {
            row.forEach((cell, x) => {
                if (cell === 1) {
                    ctx.fillStyle = level.colorGrid[y][x];
                    ctx.fillRect(x * tileSize, y * tileSize, tileSize + 0.5, tileSize + 0.5);
                }
            });
        });

        // Markers
        const drawDot = (p, color) => {
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc((p.x + 0.5) * tileSize, (p.y + 0.5) * tileSize, tileSize * 0.25, 0, Math.PI * 2);
            ctx.fill();
        };
        drawDot(level.start, '#2d3436');
        drawDot(level.end, '#d63031');

        // Continuous Path
        ctx.beginPath();
        ctx.strokeStyle = '#2d3436'; 
        ctx.lineWidth = tileSize * 0.15;
        ctx.lineJoin = 'round';
        ctx.lineCap = 'round';
        
        if (this.pathPoints.length > 0) {
            ctx.moveTo((this.pathPoints[0].x + 0.5) * tileSize, (this.pathPoints[0].y + 0.5) * tileSize);
            for (let i = 1; i < this.pathPoints.length; i++) {
                ctx.lineTo((this.pathPoints[i].x + 0.5) * tileSize, (this.pathPoints[i].y + 0.5) * tileSize);
            }
            ctx.lineTo((player.vx + 0.5) * tileSize, (player.vy + 0.5) * tileSize);
        }
        ctx.stroke();

        // Player
        const curX = (player.vx + 0.5) * tileSize;
        const curY = (player.vy + 0.5) * tileSize;
        ctx.fillStyle = '#2d3436';
        ctx.beginPath();
        ctx.arc(curX, curY, tileSize * 0.3, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.arc(curX, curY, tileSize * 0.22, 0, Math.PI * 2);
        ctx.fill();
    }

    update() {
        if (!this.level || this.state === 'MENU') return;
        const dx = this.player.x - this.player.vx;
        const dy = this.player.y - this.player.vy;
        
        const speed = 0.2;
        if (Math.abs(dx) > 0.001 || Math.abs(dy) > 0.001) {
            this.player.vx += dx * speed;
            this.player.vy += dy * speed;
        } else {
            const wasMoving = (this.player.vx !== this.player.x || this.player.vy !== this.player.y);
            this.player.vx = this.player.x;
            this.player.vy = this.player.y;
            
            if (wasMoving) {
                this.pathPoints.push({ x: this.player.x, y: this.player.y });
                if (this.player.x === this.level.end.x && this.player.y === this.level.end.y) {
                    this.state = 'WIN';
                    this.isSolving = false;
                    document.getElementById('win-message').classList.remove('hidden');
                }
            }
        }
    }

    loop() {
        this.update();
        this.draw();
        requestAnimationFrame(() => this.loop());
    }
}

const ui = {
    changeDifficulty: () => document.getElementById('difficulty-overlay').classList.remove('hidden')
};

const game = new Game();
window.onload = () => game.resize();
</script>
</body>
</html>
