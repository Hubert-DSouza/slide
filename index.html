<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SLIDE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./src/styles/main.css">
</head>
<body>

<div id="screen-home" class="screen">
    <!-- Container for dynamically generated decorative background blocks -->
    <div id="home-decor-container" style="position: absolute; inset: 0; pointer-events: none; overflow: hidden; z-index: 1;"></div>

    <h1 class="home-logo">SLIDE.</h1>

    <div class="home-btn-group">
        <button id="btn-home-play" class="home-btn home-btn-primary" onclick="ui.showScreen('screen-game'); game.startInfinite('medium')">
            PLAY
        </button>
        <button class="home-btn" onclick="ui.showDifficultyOverlay()">SETTINGS</button>
    </div>
</div>

<div id="screen-game" class="screen hidden">
    <div class="game-container">
        <aside class="panel">
            <div class="title">SLIDE.</div>
            <div class="stat-box stat-moves">
                <div class="text-[10px] uppercase opacity-40 mb-1">Current Moves</div>
                <div id="move-count" class="text-4xl font-bold">0</div>
            </div>
            <div class="stat-box stat-target">
                <div class="text-[10px] uppercase opacity-40 mb-1">Optimal</div>
                <div id="par-count" class="text-4xl font-bold">00</div>
            </div>
            <div class="mt-auto flex flex-col gap-2 w-full btn-wrapper-1">
                <button onclick="game.restart()" class="btn btn-reset">Reset</button>
                <button onclick="ui.showScreen('screen-home')" class="btn btn-secondary btn-menu">Menu</button>
            </div>
        </aside>

        <main class="flex items-center justify-center relative">
            <div class="relative">
                <canvas id="game-canvas"></canvas>
                <div id="win-message" class="overlay hidden">
                    <div class="text-center">
                        <h2 class="text-4xl font-bold mb-4">SOLVED.</h2>
                        <button onclick="game.nextLevel()" class="btn px-12">Next Board</button>
                    </div>
                </div>
            </div>
        </main>

        <aside class="panel text-right">
            <div class="mt-auto flex flex-col gap-2 w-full btn-wrapper-2">
                <button onclick="game.showSolution()" class="btn btn-secondary w-full btn-solution">Show Solution</button>
                <button onclick="ui.showDifficultyOverlay()" class="btn w-full btn-size">Settings</button>
            </div>
        </aside>
    </div>
</div>

<div id="difficulty-overlay" class="overlay hidden">
    <div class="settings-panel">
        <h2 class="settings-title">Settings</h2>

        <!-- Grid Size Settings -->
        <div class="settings-section">
            <div class="settings-label">Grid Size</div>
            <div class="theme-toggle" id="grid-size-toggle">
                <button id="grid-btn-small" onclick="game.init(6); ui.updateSettingsUI(6, null)" class="theme-toggle-btn">Small</button>
                <button id="grid-btn-medium" onclick="game.init(9); ui.updateSettingsUI(9, null)" class="theme-toggle-btn active">Medium</button>
                <button id="grid-btn-large" onclick="game.init(12); ui.updateSettingsUI(12, null)" class="theme-toggle-btn">Large</button>
            </div>
        </div>

        <!-- Theme Settings -->
        <div class="settings-section">
            <div class="settings-label">Theme</div>
            <div class="theme-toggle" id="theme-toggle-row">
                <button id="theme-btn-minimal" class="theme-toggle-btn active" onclick="game.setTheme('minimal'); ui.updateSettingsUI(null, 'minimal')">Minimal</button>
                <button id="theme-btn-ethereal" class="theme-toggle-btn" onclick="game.setTheme('ethereal'); ui.updateSettingsUI(null, 'ethereal')">Ethereal</button>
            </div>
        </div>

        <button onclick="ui.hideDifficultyOverlay()" class="win-next-btn" style="width: 100%; margin-top: 1.5rem;">Done</button>
    </div>
</div>

<script type="module" src="./src/js/main.js"></script>
</body>
</html>
